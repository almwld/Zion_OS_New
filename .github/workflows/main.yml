name: 🚀 Build Sehatak APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 💙 Setup Flutter 3.24.0
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true
    
    - name: 📦 Install dependencies
      run: |
        cd sehatak_flutter
        flutter pub get
    
    - name: 🔨 Build APK (optimized)
      run: |
        cd sehatak_flutter
        flutter build apk --release --split-per-abi \
          --obfuscate --split-debug-info=build/debug-info \
          --target-platform android-arm64,android-arm,android-x64
    
    - name: 📤 Upload arm64-v8a
      uses: actions/upload-artifact@v4
      with:
        name: app-arm64-v8a
        path: sehatak_flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
        retention-days: 30
    
    - name: 📤 Upload armeabi-v7a
      uses: actions/upload-artifact@v4
      with:
        name: app-armeabi-v7a
        path: sehatak_flutter/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
        retention-days: 30
    
    - name: 📤 Upload x86_64
      uses: actions/upload-artifact@v4
      with:
        name: app-x86_64
        path: sehatak_flutter/build/app/outputs/flutter-apk/app-x86_64-release.apk
        retention-days: 30
