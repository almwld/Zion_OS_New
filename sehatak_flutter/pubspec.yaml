name: sehatak
description: A comprehensive healthcare platform for Yemen
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10
  google_sign_in: ^6.2.1
  agora_rtc_engine: ^6.3.0
  
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  image_picker: ^1.0.7
  url_launcher: ^6.2.3
  http: ^1.2.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  permission_handler: ^11.1.0
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  table_calendar: ^3.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/placeholder.png
    - assets/icons/app_icon.png
    - assets/fonts/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  flutter_local_notifications: ^18.0.0
  google_maps_flutter: ^2.5.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  fl_chart: ^0.66.0
  confetti: ^0.7.0
