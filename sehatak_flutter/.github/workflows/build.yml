name: 🚀 Build Sehatak APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 استنساخ المشروع
      uses: actions/checkout@v4
    
    - name: ☕ إعداد Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 💙 إعداد Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
        cache: true
    
    - name: 📂 الدخول لمجلد التطبيق
      run: cd sehatak_flutter
    
    - name: 📦 تثبيت الاعتماديات
      run: |
        cd sehatak_flutter
        flutter pub get
    
    - name: 🔑 إنشاء google-services.json
      run: |
        cat > sehatak_flutter/android/app/google-services.json << 'JSONEOF'
        {
          "project_info": {
            "project_number": "302830226901",
            "project_id": "sehatak-latform",
            "storage_bucket": "sehatak-latform.firebasestorage.app"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:302830226901:android:c768d699c649114216415c",
                "android_client_info": {
                  "package_name": "com.sehatak.app"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "AIzaSyAMcD8bz4fA9s5-MFXz2vlDErLVAdy8YfE"
                }
              ],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }
          ],
          "configuration_version": "1"
        }
        JSONEOF
    
    - name: 🔧 إنشاء firebase_options.dart
      run: |
        mkdir -p sehatak_flutter/lib
        cat > sehatak_flutter/lib/firebase_options.dart << 'DARTEOF'
        import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
        import 'package:flutter/foundation.dart' show defaultTargetPlatform, TargetPlatform;

        class DefaultFirebaseOptions {
          static FirebaseOptions get currentPlatform {
            switch (defaultTargetPlatform) {
              case TargetPlatform.android:
                return android;
              default:
                return android;
            }
          }

          static const FirebaseOptions android = FirebaseOptions(
            apiKey: 'AIzaSyAMcD8bz4fA9s5-MFXz2vlDErLVAdy8YfE',
            appId: '1:302830226901:android:c768d699c649114216415c',
            messagingSenderId: '302830226901',
            projectId: 'sehatak-latform',
            storageBucket: 'sehatak-latform.firebasestorage.app',
          );
        }
        DARTEOF
    
    - name: 🔨 بناء APK
      run: |
        cd sehatak_flutter
        flutter build apk --release
    
    - name: 📤 رفع APK
      uses: actions/upload-artifact@v4
      with:
        name: Sehatak-App
        path: sehatak_flutter/build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
    
    - name: 🎉 إنشاء Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: "🚀 صحتك - إصدار v1.0.${{ github.run_number }}"
        body: |
          ## 📱 منصة صحتك - Sehatak
          
          ✅ بناء تلقائي من GitHub Actions
          
          ### 📥 التحميل:
          انقر على الملف أدناه لتحميل التطبيق
        files: sehatak_flutter/build/app/outputs/flutter-apk/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
