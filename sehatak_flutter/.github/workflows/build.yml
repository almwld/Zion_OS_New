name: Build Sehatak APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Install dependencies
      run: |
        cd sehatak_flutter
        flutter pub get
    
    - name: Build APK
      run: |
        cd sehatak_flutter
        flutter build apk --release
    
    - uses: actions/upload-artifact@v4
      with:
        name: sehatak-app
        path: sehatak_flutter/build/app/outputs/flutter-apk/app-release.apk
